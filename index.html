    <!--
      当被 SSR 外壳的 iframe 嵌入时（window.parent !== window），把 Vue 当前 title
      通过 postMessage 透传给外壳，外壳的 message 监听会用它替换 <title>。
      用 MutationObserver 监听 <title> 子节点变化：Vue Router 改 document.title
      时立刻同步给外壳，外壳 tab 永远跟着 Vue 当前页走。
    -->
    <script>
      (function () {
        if (typeof window === 'undefined' || window.parent === window) return;
        var post = function () {
          try {
            var t = (document.title || '').trim();
            if (!t) return;
            window.parent.postMessage({ title: t }, '*');
          } catch (e) { /* ignore */ }
        };
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', post);
        } else {
          post();
        }
        var titleEl = document.querySelector('head > title');
        if (titleEl && typeof MutationObserver !== 'undefined') {
          new MutationObserver(post).observe(titleEl, { childList: true });
        }
      })();
    </script>
